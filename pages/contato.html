<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/styleContato.css">
</head>
<body>

   <header class="navbar navbar-expand-lg bg-white sticky-top">
        <div class="container navbar-container">
            <a class="navbar-brand logo-placeholder" href="/index.html">
                <img src="../assets/img/logo.png" alt="Logo do ELO" class="img-fluid rounded-circle" style="width: 40px; height: 40px; object-fit: cover;">
            </a>
            
            <nav class="d-none d-md-flex align-items-center mx-auto">
                <ul class="nav-links">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="jogos/jogos.html">Jogo</a></li>
                    <li><a href="sobre.html">Sobre</a></li>
                    <li><a href="contato.html">Contato</a></li>
                </ul>
            </nav>
            
            <a href="login/index.html" class="btn-entrar">
                <i class="fa-solid fa-right-to-bracket"></i>Entrar
            </a>
        </div>
    </header>

    <main>
        
        <section class="card redes-sociais-card text-light">
            <h2>Redes Sociais</h2>
            
            <div class="rede-item">
                <i class="fa-brands fa-instagram"></i>
                <div class="linha-placeholder"></div>
            </div>
            
            <div class="rede-item">
                <i class="fa-regular fa-envelope"></i>
                <div class="linha-placeholder"></div>
            </div>
            
            <div class="rede-item">
                <i class="fa-solid fa-phone"></i>
                <div class="linha-placeholder"></div>
            </div>
            
            <div class="rede-item">
                <i class="fa-brands fa-whatsapp"></i>
                <div class="linha-placeholder"></div>
            </div>
            
            <div class="rede-item">
                <i class="fa-solid fa-globe"></i>
                <div class="linha-placeholder"></div>
            </div>
        </section>

        <section class="card contato-card text-light">
            <h2>Contatos</h2>
            <form>
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>
                
                <div class="form-group">
                    <label for="ultimo-nome">Ultimo Nome</label>
                    <input type="text" id="ultimo-nome" required>
                </div>
                
                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </section>

    </main>

    <footer>
        <h2>Rodapé</h2>
    </footer>

</body>
</html>
