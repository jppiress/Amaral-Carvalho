   <header class="navbar navbar-expand-lg bg-white sticky-top">

            </nav>
            
            <a href="login/index.html" class="btn-entrar">
                <i class="fa-solid fa-right-to-bracket"></i>Entrar
            </a>
        </div>
    </header>

    <main>
        
        <section class="card redes-sociais-card text-light">
            <h2>Redes Sociais </h2>
            <p>Amaral Carvalho: </p>
            
            
            <div class="rede-item">
                <i class="fa-brands fa-instagram"></i>
                <a href="https://www.instagram.com/amaral.carvalho/" target="_blank" class="text-light">@amaral.carvalho</a>
                
            </div>
            
            <div class="rede-item">
                <i class="fa-regular fa-envelope"></i>
                <a href="mailto:ouvidoria@amaralcarvalho.org.br" target="_blank" class="text-light">ouvidoria</a>
            </div>
            
            <div class="rede-item">
                <i class="fa-solid fa-phone"></i>
                (14) 3602-1200
            </div>
            
            <div class="rede-item">
                <i class="fa-solid fa-globe"></i>
                <a href="https://www.amaralcarvalho.org.br/" target="_blank" class="text-light">www.amaralcarvalho.org.br</a>
            </div>
        </section>

        <section class="card contato-card text-light">
            <h2>Contatos</h2>
            <form>
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" placeholder="Digite seu nome aqui :D" required>
                </div>
                
                <div class="form-group">
                    <label for="ultimo-nome">Email</label>
                    <input type="email" id="email" placeholder="jorgimBalacoBaco@exemplo.com" required>
                </div>
                <div class="form-group">
                    <label for="assunto">Assunto</label>
                    <input type="text" id="assunto" placeholder="Digite o assunto aqui :D" required>
                </div>
                
                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" placeholder="Digite uma mensagem aqui :D" required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </section>

    </main>

    <footer class="text-center py-5">
        <div class="container">
            <h2 class="footer-title m-0">Desenvolvido em 2026</h2>
        </div>
