<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastrar Conta - ELO</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <link rel="stylesheet" href="../../../assets/css/styleCadastro.css">
</head>

<body class="login-body">

    <header class="navbar navbar-expand-lg bg-white sticky-top">
        <div class="container navbar-container">
            <a class="navbar-brand logo-placeholder" href="/index.html">
                <img src="../../../assets/img/logo.png" alt="Logo do ELO" class="img-fluid rounded-circle" style="width: 40px; height: 40px; object-fit: cover;">
            </a>
            
            <nav class="d-none d-md-flex align-items-center mx-auto">
                <ul class="nav-links">
                    <li><a href="../../../index.html" class="active">Início</a></li>
                    <li><a href="../../jogos/jogos.html">Jogo</a></li>
                    <li><a href="../../sobre.html">Sobre</a></li>
                    <li><a href="../../contato.html">Contato</a></li>
                </ul>
            </nav>
            
            <a href="../index.html" class="btn-entrar">
                <i class="fa-solid fa-right-to-bracket"></i>Entrar
            </a>
        </div>
    </header>

    <div class="container min-vh-100 d-flex align-items-center justify-content-center p-3" style="margin-top: -60px;">
        
        <div class="login-box text-center p-4 p-sm-5 rounded-4 position-relative">
            
            <h1 class="login-title mb-4">Cadastrar <span class="highlight-magenta">conta</span></h1>
            
            <div class="logo-container mx-auto mb-5">
                <img src="../../../assets/img/logo.png" alt="Logo do ELO" class="img-fluid logo-img w-100">
            </div>
            
            <form class="mx-auto form-container">
                
                <div class="input-group-custom mb-4 d-flex align-items-center">
                    <i class="fa-regular fa-user input-icon"></i>
                    <input type="text" placeholder="Nome" class="form-input-line w-100" required>
                </div>

                <div class="input-group-custom mb-4 d-flex align-items-center">
                    <i class="fa-regular fa-envelope input-icon"></i>
                    <input type="email" placeholder="Email" class="form-input-line w-100" required>
                </div>
                
                <div class="input-group-custom mb-4 d-flex align-items-center">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" placeholder="Senha" class="form-input-line w-100" required>
                </div>

                <div class="input-group-custom mb-5 d-flex align-items-center">
                    <i class="fa-solid fa-lock input-icon"></i>
                    <input type="password" placeholder="Confirmar senha" class="form-input-line w-100" required>
                </div>
                
                <div class="d-flex flex-column gap-3 align-items-center mt-4">
                    <button type="submit" class="btn-login-action btn-confirmar">Confirmar</button>
                    <a href="../index.html" class="btn-login-action btn-possui-conta text-decoration-none d-flex align-items-center justify-content-center">Possui Conta?</a>
                </div>
                
            </form>
        </div>
        
    </div>

</body>
</html>
