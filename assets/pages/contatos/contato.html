<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/styleContato.css">
</head>
<body>

    <header>
        <div class="logo-placeholder">
            <i class="fa-solid fa-wand-magic-sparkles"></i>
        </div>
        <nav>
            <ul>
                <li><a href="../../../index.html">Inicio</a></li>
                <li><a href="../jogos/jogos.html">Jogo</a></li>
                <li><a href="../sobre.html">Sobre</a></li>
                <li><a href="contato.html">Contato</a></li>
            </ul>
        </nav>
        <a href="#" class="btn-entrar">
            <i class="fa-solid fa-right-to-bracket"></i> Entrar
        </a>
    </header>

    <main>
        
        <section class="card redes-sociais-card">
            <h2>Redes Sociais</h2>
            
            <div class="rede-item">
                <i class="fa-brands fa-instagram"></i>
                <div class="linha-placeholder"></div>
            </div>
            
            <div class="rede-item">
                <i class="fa-regular fa-envelope"></i>
                <div class="linha-placeholder"></div>
            </div>
            
            <div class="rede-item">
                <i class="fa-solid fa-phone"></i>
                <div class="linha-placeholder"></div>
            </div>
            
            <div class="rede-item">
                <i class="fa-brands fa-whatsapp"></i>
                <div class="linha-placeholder"></div>
            </div>
            
            <div class="rede-item">
                <i class="fa-solid fa-globe"></i>
                <div class="linha-placeholder"></div>
            </div>
        </section>

        <section class="card contato-card">
            <h2>Contatos</h2>
            <form>
                <div class="form-group">
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" required>
                </div>
                
                <div class="form-group">
                    <label for="ultimo-nome">Ultimo Nome</label>
                    <input type="text" id="ultimo-nome" required>
                </div>
                
                <div class="form-group">
                    <label for="mensagem">Mensagem</label>
                    <textarea id="mensagem" required></textarea>
                </div>

                <button type="submit" class="btn-enviar">Enviar</button>
            </form>
        </section>

    </main>

    <footer>
        <h2>Rodapé</h2>
    </footer>

</body>
</html>
